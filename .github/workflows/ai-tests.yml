name: AI Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
        default: 'all'

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  test:
    name: AI Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Check for GROQ_API_KEY
        id: check_key
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "GROQ_API_KEY not set, skipping AI tests"
            echo "has_key=false" >> $GITHUB_OUTPUT
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure environment
        if: steps.check_key.outputs.has_key == 'true'
        run: |
          cp .env.example .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "GROQ_MODEL=llama-3.3-70b-versatile" >> .env

      - name: Run AI Playwright tests
        if: steps.check_key.outputs.has_key == 'true'
        run: pytest -v --tb=short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Skip AI tests (no API key)
        if: steps.check_key.outputs.has_key == 'false'
        run: |
          echo "⚠️ GROQ_API_KEY not configured in repository secrets. Skipping AI tests."
          echo "To enable: Add GROQ_API_KEY to repository secrets (Settings > Secrets > Actions)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            .pytest_cache/
            test-results/
          retention-days: 7

      - name: Upload AI analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis-logs
          path: ai-analysis-logs/
          retention-days: 7

  notify:
    name: Notify on Failure
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "❌ AI Playwright tests failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run: ${{ github.run_id }}"
          echo "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"