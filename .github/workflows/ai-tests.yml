name: AI Playwright Tests CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 9,21 * * *'
  workflow_dispatch:

jobs:
  test:
    name: AI Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-rerunfailures
          playwright install --with-deps chromium

      - name: Start Xvfb
        run: |
          sudo Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3

      - name: Run AI Playwright Tests (headless)
        run: pytest --browser=chromium --reruns=2 -x
        env:
          CI: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISPLAY: :99
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: test-results/
          retention-days: 7

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

  allure:
    name: Generate Allure Report
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-rerunfailures
          playwright install --with-deps chromium

      - name: Start Xvfb
        run: |
          sudo Xvfb :99 -screen 0 1920x1080x24 &
          sleep 3

      - name: Run AI Playwright Tests for Allure
        run: pytest --browser=chromium --reruns=2 -x
        env:
          CI: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISPLAY: :99
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

      - name: Install Allure
        run: npm install -g allure-commandline

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Generate Environment Properties
        run: |
          cat > allure-results/environment.properties << 'EOF'
          framework=Playwright + AI (Groq/GPT)
          language=Python
          browser=Chromium
          os=Ubuntu
          project=Kaio-QA-portfolio-playwright-AI-testing
          repo=https://github.com/qakaio/Kaio-QA-portfolio-playwright-AI-testing
          EOF

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report --name "Kaio-QA-portfolio-playwright-AI-testing - AI-Powered Playwright Tests"
        env:
          ALLURE_RESULTS_DIR: allure-results

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report
          keep_files: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pip install ruff
      - run: ruff check .